
<!DOCTYPE html>
<html>
<head>
  <title>TaskFlow – Smart Productivity Dashboard</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
                  url("Wallpaper.jpg") no-repeat center center fixed;
      background-size: cover;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: rgba(0,0,0,0.9);
      padding: 20px;
      min-height: 100vh;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar h2 {
      margin-top: 0;
      color: #2ecc71;
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    .top-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .progress-card {
      margin-bottom: 20px;
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 10px;
    }

    .progress-bar {
      background: #333;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 10px;
      background: #2ecc71;
      width: 0%;
    }

    input, select, button {
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      width: 100%;
    }

    button {
      background: #27ae60;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .task-section {
      margin-top: 20px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: grab;
    }

    .completed {
      text-decoration: line-through;
      color: #bbb;
    }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .delete-btn {
      background: #e74c3c;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <h2>TaskFlow</h2>
  <p>Smart Scheduler</p>
</div>

<div class="main">

  <div class="top-cards">
    <div class="card"><h3 id="totalTasks">0</h3><p>Total Tasks</p></div>
    <div class="card"><h3 id="completedTasks">0</h3><p>Completed</p></div>
    <div class="card"><h3 id="pendingTasks">0</h3><p>Pending</p></div>
  </div>

  <div class="progress-card">
    <h4>Progress</h4>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <input type="text" id="taskInput" placeholder="Task description">
  <input type="date" id="dueDate">

  <select id="priority">
    <option value="Low">Low Priority</option>
    <option value="Medium">Medium Priority</option>
    <option value="High">High Priority</option>
  </select>

  <select id="category">
    <option value="Study">Study</option>
    <option value="Work">Work</option>
    <option value="Personal">Personal</option>
    <option value="Finance">Finance</option>
  </select>

  <button onclick="addTask()">Add Task</button>

  <div class="task-section">
    <ul id="taskList"></ul>
  </div>

  <div class="charts">
    <canvas id="priorityChart"></canvas>
    <canvas id="categoryChart"></canvas>
  </div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function updateStats() {
  const total = tasks.length;
  const completed = tasks.filter(t => t.completed).length;
  const percent = total === 0 ? 0 : (completed / total) * 100;

  document.getElementById("totalTasks").innerText = total;
  document.getElementById("completedTasks").innerText = completed;
  document.getElementById("pendingTasks").innerText = total - completed;
  document.getElementById("progressFill").style.width = percent + "%";
}

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = `${task.text} (${task.priority} | ${task.category})`;
    if (task.completed) span.classList.add("completed");

    span.onclick = function() {
      task.completed = !task.completed;
      saveTasks();
      renderTasks();
      updateCharts();
    };

    const del = document.createElement("button");
    del.textContent = "Delete";
    del.className = "delete-btn";
    del.onclick = function() {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
      updateCharts();
    };

    li.appendChild(span);
    li.appendChild(del);
    list.appendChild(li);
  });

  updateStats();
}

function addTask() {
  const text = document.getElementById("taskInput").value.trim();
  const dueDate = document.getElementById("dueDate").value;
  const priority = document.getElementById("priority").value;
  const category = document.getElementById("category").value;

  if (!text) return;

  tasks.push({ text, dueDate, priority, category, completed: false });
  saveTasks();
  document.getElementById("taskInput").value = "";
  renderTasks();
  updateCharts();
}

new Sortable(document.getElementById("taskList"), {
  animation: 150,
  onEnd: function (evt) {
    const movedItem = tasks.splice(evt.oldIndex, 1)[0];
    tasks.splice(evt.newIndex, 0, movedItem);
    saveTasks();
  }
});

let priorityChart, categoryChart;

function updateCharts() {
  const priorityCount = { Low:0, Medium:0, High:0 };
  const categoryCount = { Study:0, Work:0, Personal:0, Finance:0 };

  tasks.forEach(t => {
    priorityCount[t.priority]++;
    categoryCount[t.category]++;
  });

  if (priorityChart) priorityChart.destroy();
  if (categoryChart) categoryChart.destroy();

  priorityChart = new Chart(document.getElementById("priorityChart"), {
    type: 'pie',
    data: {
      labels: Object.keys(priorityCount),
      datasets: [{
        data: Object.values(priorityCount)
      }]
    }
  });

  categoryChart = new Chart(document.getElementById("categoryChart"), {
    type: 'bar',
    data: {
      labels: Object.keys(categoryCount),
      datasets: [{
        data: Object.values(categoryCount)
      }]
    }
  });
}

renderTasks();
updateCharts();

</script>

</body>
</html>
